name: Build manifest & deploy to Pages

# Regenerates guides.json from the guides/ folders on every push to main,
# then publishes the site to GitHub Pages. If you'd rather manage guides.json
# by hand, delete this file — the site works with a hand-edited manifest too.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rebuild guides.json
        run: node scripts/build-manifest.mjs

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
